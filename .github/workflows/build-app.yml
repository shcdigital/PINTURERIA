name: Build and Deploy App

on:
  push:
    branches: [main]
    paths:
      - 'app-ofertas/**'
      - '.github/workflows/build-app.yml'

jobs:
  build:
    runs-on: windows-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11']

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      working-directory: app-ofertas
      run: |
        pip install --upgrade pip
        pip install -r requirements.txt

    - name: Build executable
      working-directory: app-ofertas
      run: |
        pip install pyinstaller
        pyinstaller --onefile --windowed --name "GestorOfertas" --add-data "static;static" --add-data "drafts;drafts" app.py

    - name: Create release
      uses: softprops/action-gh-release@v1
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      with:
        name: Release ${{ github.run_number }}
        tag_name: v${{ github.run_number }}
        draft: false
        prerelease: false
        files: |
          app-ofertas/dist/GestorOfertas.exe

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: gestor-ofertas-${{ github.run_number }}
        path: app-ofertas/dist/

  deploy-pages:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'

    - name: Install dependencies
      run: |
        npm install -g @vercel/next
        npm install -g @cloudflare/wrangler

    - name: Deploy to GitHub Pages
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git checkout -b gh-pages
        git add -A
        git commit -m "Deploy to GitHub Pages [skip ci]"
        git push origin gh-pages --force

  release-notes:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Generate release notes
      run: |
        echo "## Release Notes" > RELEASE_NOTES.md
        echo "" >> RELEASE_NOTES.md
        echo "### Changes" >> RELEASE_NOTES.md
        echo "- Updated app-ofertas with latest changes" >> RELEASE_NOTES.md
        echo "- Fixed various issues" >> RELEASE_NOTES.md
        echo "- Improved performance" >> RELEASE_NOTES.md
        echo "" >> RELEASE_NOTES.md
        echo "### New Features" >> RELEASE_NOTES.md
        echo "- Added new visualizer tool" >> RELEASE_NOTES.md
        echo "- Enhanced user interface" >> RELEASE_NOTES.md
        echo "" >> RELEASE_NOTES.md
        echo "### Bug Fixes" >> RELEASE_NOTES.md
        echo "- Fixed color picker issues" >> RELEASE_NOTES.md
        echo "- Resolved navigation problems" >> RELEASE_NOTES.md

    - name: Upload release notes
      uses: actions/upload-artifact@v4
      with:
        name: release-notes
        path: RELEASE_NOTES.md